<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Anaya Couture | Luxury Ethnic Wear</title>
  <meta name="description" content="Browse our curated collection of luxury sarees, bridal lehengas, designer suits and ethnic kurtas. Handcrafted by India's finest artisans.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <style>
    .shop-hero{padding:140px 0 60px;text-align:center;border-bottom:1px solid var(--gold-border)}
    .shop-layout{display:grid;grid-template-columns:260px 1fr;gap:48px;padding-top:48px}
    .filter-panel{position:sticky;top:100px;height:fit-content}
    .filter-group{margin-bottom:32px}
    .filter-group h4{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--gold);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--gold-border)}
    .filter-btn{display:block;padding:8px 0;color:var(--stone);font-size:.85rem;cursor:pointer;transition:all .2s;font-weight:500;border:none;background:none;text-align:left;width:100%;font-family:var(--font-body)}
    .filter-btn:hover,.filter-btn.active{color:var(--gold);padding-left:8px}
    .filter-btn.active{font-weight:700}
    .shop-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;padding-bottom:16px;border-bottom:1px solid var(--gold-border)}
    .sort-select{background:none;border:none;color:var(--gold);font-family:var(--font-body);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;outline:none}
    @media(max-width:900px){.shop-layout{grid-template-columns:1fr}.filter-panel{display:none}}
  </style>
</head>
<body>
  <div class="scroll-progress"></div>

  <nav class="navbar scrolled"><div class="nav-inner">
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="shop.html" class="nav-link active">Shop</a>
    </div>
    <a href="index.html" class="nav-logo"><span class="nav-logo-text">ANAYA</span><span class="nav-logo-sub">Couture</span></a>
    <div class="nav-links">
      <a href="stylist.html" class="nav-link">AI Stylist</a>
      <a href="about.html" class="nav-link">Our Story</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="nav-action-btn">🛒<span class="cart-count" style="display:none">0</span></a>
    </div>
    <button class="mobile-menu-btn"><span></span><span></span><span></span></button>
  </div></nav>
  <div class="mobile-nav"><button class="mobile-nav-close">✕</button><a href="index.html" class="nav-link">Home</a><a href="shop.html" class="nav-link">Shop</a><a href="stylist.html" class="nav-link">AI Stylist</a><a href="about.html" class="nav-link">About</a><a href="cart.html" class="nav-link">Cart</a></div>

  <!-- Shop Hero -->
  <section class="shop-hero container">
    <span class="label-luxury anim-fade-in-up">The Collection</span>
    <h1 class="display-lg anim-fade-in-up delay-200" style="margin:16px 0 12px">Shop All</h1>
    <p class="anim-fade-in-up delay-400" style="color:var(--stone);font-family:var(--font-accent);font-style:italic;font-size:1.1rem" id="shop-count">Displaying 17 Curations</p>
  </section>

  <main class="container shop-layout">
    <!-- Filters -->
    <aside class="filter-panel">
      <div class="filter-group">
        <h4>Collection</h4>
        <button class="filter-btn active" data-filter="category" data-value="all" onclick="Shop.toggle(this)">All Pieces</button>
        <button class="filter-btn" data-filter="category" data-value="sarees" onclick="Shop.toggle(this)">Silk Sarees</button>
        <button class="filter-btn" data-filter="category" data-value="lehengas" onclick="Shop.toggle(this)">Bridal Lehengas</button>
        <button class="filter-btn" data-filter="category" data-value="suits" onclick="Shop.toggle(this)">Designer Suits</button>
      </div>
      <div class="filter-group">
        <h4>Occasion</h4>
        <button class="filter-btn active" data-filter="occasion" data-value="all" onclick="Shop.toggle(this)">All Occasions</button>
        <button class="filter-btn" data-filter="occasion" data-value="Wedding" onclick="Shop.toggle(this)">Wedding</button>
        <button class="filter-btn" data-filter="occasion" data-value="Festive" onclick="Shop.toggle(this)">Festive</button>
        <button class="filter-btn" data-filter="occasion" data-value="Party" onclick="Shop.toggle(this)">Party</button>
        <button class="filter-btn" data-filter="occasion" data-value="Casual" onclick="Shop.toggle(this)">Casual</button>
      </div>
      <div class="filter-group">
        <h4>Price</h4>
        <button class="filter-btn active" data-filter="price" data-value="all" onclick="Shop.toggle(this)">All Prices</button>
        <button class="filter-btn" data-filter="price" data-value="0-3000" onclick="Shop.toggle(this)">Under ₹3,000</button>
        <button class="filter-btn" data-filter="price" data-value="3000-8000" onclick="Shop.toggle(this)">₹3,000 — ₹8,000</button>
        <button class="filter-btn" data-filter="price" data-value="8000-99999" onclick="Shop.toggle(this)">Above ₹8,000</button>
      </div>
    </aside>

    <!-- Product Grid -->
    <section>
      <div class="shop-header">
        <div>
          <h2 style="font-size:1.5rem">The Collection</h2>
        </div>
        <select class="sort-select" id="sort" onchange="Shop.apply()">
          <option value="pop">Bestselling</option>
          <option value="new">Newest</option>
          <option value="low">Price: Low → High</option>
          <option value="high">Price: High → Low</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:28px" id="grid"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 Anaya Couture. All rights reserved.</p>
        <div class="footer-payments"><span>💳 Visa</span><span>📱 UPI</span><span>💵 COD</span></div>
      </div>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    const Shop = {
      filters: { category: 'all', occasion: 'all', price: 'all' },
      init() {
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');
        if (cat) {
          this.filters.category = cat;
          document.querySelectorAll('[data-filter="category"]').forEach(b => b.classList.toggle('active', b.dataset.value === cat));
        }
        this.apply();
      },
      toggle(el) {
        const group = el.dataset.filter;
        document.querySelectorAll(`[data-filter="${group}"]`).forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        this.filters[group] = el.dataset.value;
        this.apply();
      },
      apply() {
        const catalog = App.catalog.length ? App.catalog : PRODUCTS;
        let items = [...catalog];
        if (this.filters.category !== 'all') items = items.filter(i => i.category === this.filters.category);
        if (this.filters.occasion !== 'all') items = items.filter(i => i.occasion === this.filters.occasion);
        if (this.filters.price !== 'all') {
          const [min, max] = this.filters.price.split('-').map(Number);
          items = items.filter(i => i.price >= min && i.price <= max);
        }
        const sort = document.getElementById('sort').value;
        if (sort === 'low') items.sort((a,b) => a.price - b.price);
        else if (sort === 'high') items.sort((a,b) => b.price - a.price);
        else if (sort === 'new') items.sort((a,b) => (b.tags.includes('new')?1:0) - (a.tags.includes('new')?1:0));
        else items.sort((a,b) => b.sold - a.sold);

        document.getElementById('grid').innerHTML = items.map(i => App.renderProductCard(i)).join('');
        document.getElementById('shop-count').textContent = `Displaying ${items.length} Curation${items.length !== 1 ? 's' : ''}`;

        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); obs.unobserve(e.target); } });
        }, { threshold: 0.08 });
        document.querySelectorAll('.reveal-pretty').forEach(el => obs.observe(el));
      }
    };
    document.addEventListener('app:ready', () => Shop.init());
  </script>
</body>
</html>
